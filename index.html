<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="./style.css"> 
</head>
<body>
    <div class="alignDiv">
    <div class="mainBox">
        <h1 class="title">To Do list</h1>
        <div id="inputForm">
            <input class="simpleInput"id="textInput" type="text" placeholder="Task title...">
            <button class="simpleInput" id="addTask">Add</button>
        </div>
        <h3>Task List</h3>
        <ul id="myList">       
        </ul>
        <p>Completed: <span id="completedTask">0 </span> Uncompleted: <span id="uncompletedTask">0</span></p>
    </div>
    <script src="./script.js"></script>
    </div>
</body>
</html>
